name: Publish Go service

on:
  workflow_call:
    inputs:
      image_name:
        description: "ghcr.io image suffix, e.g. muxly-backend → ghcr.io/muxly-corp/muxly-backend"
        required: true
        type: string
      go_version_file:
        description: "File passed to actions/setup-go via go-version-file"
        required: false
        type: string
        default: "go.mod"

env:
  GOPROXY: https://buf.build/gen/go,https://proxy.golang.org,direct
  GOPRIVATE: github.com/Muxly-Corp/*

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.go_version_file }}
      - name: Configure git for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
