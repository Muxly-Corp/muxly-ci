name: Test matrix in reusable workflow

on:
  workflow_call:

jobs:
  pre1:
    runs-on: ubuntu-latest
    steps:
      - run: echo pre1
  pre2:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo pre2
  stub:
    needs: [pre1, pre2]
    if: ${{ always() && needs.pre1.result == 'success' && (needs.pre2.result == 'success' || needs.pre2.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "stub ran via always-if"

  matrix-test:
    needs: stub
    strategy:
      fail-fast: false
      matrix:
        cluster: [dev-ru, dev-eu]
    runs-on: muxly-${{ matrix.cluster }}
    steps:
      - run: echo "matrix.cluster=${{ matrix.cluster }}"
